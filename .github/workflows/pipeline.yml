name: CI/CD Pipeline

# Trigger on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout source code ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Build and test with Maven ─────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven   # Cache ~/.m2 to speed up subsequent runs

      - name: Build and test with Maven
        run: ./mvnw clean package -B
        # -B = batch mode (no interactive prompts, cleaner CI output)
        # Tests run automatically; a failure here stops the pipeline.

      # ── Step 3: Build Docker image and push to Docker Hub ─────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Credentials stored as GitHub Secrets — never hard-coded
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Tag with both 'latest' and the commit SHA for traceability
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/java-pipeline-app
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

      # ── Step 4: Deploy via Ansible ─────────────────────────────────────────
      - name: Install Ansible
        run: pip install ansible

      - name: Install Ansible Docker collection
        run: ansible-galaxy collection install community.docker

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          # Write the private key from GitHub Secrets to a file
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run Ansible deployment playbook
        run: |
          ansible-playbook ansible/deploy.yml \
            -i ansible/inventory/hosts.ini \
            --extra-vars "docker_image=${{ secrets.DOCKERHUB_USERNAME }}/java-pipeline-app:latest" \
            --extra-vars "ansible_host=${{ secrets.TARGET_SERVER_IP }}"
        # TARGET_SERVER_IP overrides the placeholder in hosts.ini at runtime
        # so you don't need to commit the real IP to the repository.
