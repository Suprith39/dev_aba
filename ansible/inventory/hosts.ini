# Ansible inventory file
# Replace YOUR_SERVER_IP with the actual IP address of your Ubuntu 22.04 target server.
# Replace /path/to/your/private/key with the path to your SSH private key file.

[webservers]
YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=/path/to/your/private/key

[webservers:vars]
# Disable strict host key checking so the first connection doesn't prompt
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
